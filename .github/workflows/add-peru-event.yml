name: Add Peru timeline event

on:
  push:
    branches:
      - feature/nico-todd-peru-trip

permissions:
  contents: write

jobs:
  add-event:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/nico-todd-peru-trip
      - name: Add event to timeline
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('data/timeline.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          event_id = 'nico-todd-peru-trip'

          if any(event.get('id') == event_id for event in data['events']):
              raise SystemExit(0)

          event = {
              'id': event_id,
              'date': '2026-06-07',
              'dateLabel': 'June 7–17, 2026',
              'sort': '2026-06-07T08:00:00',
              'title': 'Nico and Todd Travel to Peru',
              'summary': 'Nico and Todd join a school trip to Peru, visiting historic sites including Machu Picchu.',
              'details': 'From June 7 through June 17, Nico and Todd travel to Peru on a school trip. The group visits historic and cultural sites, including Machu Picchu, making the trip a major shared travel experience for the two of them.',
              'era': 'Summer 2026',
              'certainty': 'range',
              'importance': 'supporting',
              'categories': ['School Event', 'Travel'],
              'people': ['nicholas', 'todd'],
              'storylines': []
          }

          insert_at = next(
              (index for index, item in enumerate(data['events']) if item.get('id') == 'zach-moves'),
              len(data['events'])
          )
          data['events'].insert(insert_at, event)
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Commit timeline update
        run: |
          if git diff --quiet -- data/timeline.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/timeline.json
          git commit -m "Add Nico and Todd Peru school trip"
          git push origin HEAD:feature/nico-todd-peru-trip
